<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ChatWithKK AI</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <!-- Sidebar -->

  <div class="sidebar">

    <div class="logo">
      ChatWithKK
    </div>

    <button id="newChat">
      + New Chat
    </button>

  </div>

  <!-- Main -->

  <div class="main">

    <div class="topbar">
      ChatWithKK AI
    </div>

    <div class="chat-area" id="chatArea">

      <div class="welcome" id="welcomeBox">

        <h1>👋 Hello</h1>

        <p>
          Ask me anything...
        </p>

      </div>

    </div>

    <div class="input-area">

      <textarea
        id="message"
        placeholder="Message ChatWithKK..."
      ></textarea>

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
