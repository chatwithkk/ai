<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatWithKK</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        ChatWithKK
      </div>

      <button class="new-chat">
        + New Chat
      </button>

      <div class="chat-history">
        <div class="history-item active">
          AI Chat
        </div>
      </div>
    </div>

    <!-- Main Chat -->
    <div class="main">

      <div class="topbar">
        <h2>ChatWithKK AI</h2>
      </div>

      <div id="chat-box">

        <div class="ai-message">
          👋 Hello! Ask me anything.
        </div>

      </div>

      <div class="input-area">

        <textarea
          id="message"
          placeholder="Message ChatWithKK..."
        ></textarea>

        <button id="send">
          Send
        </button>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
