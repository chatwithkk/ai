<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatWithKK AI</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <div class="sidebar">
    <h2>ChatWithKK</h2>

    <button id="newChat">+ New Chat</button>

    <div class="chat-list">
      <div class="chat-item active">AI Chat</div>
    </div>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>ChatWithKK AI</h1>
    </div>

    <div class="chat-area" id="chatArea">

      <div class="welcome" id="welcomeBox">
        👋 Hello! Ask me anything.
      </div>

    </div>

    <div class="input-area">
      <input type="text" id="message" placeholder="Message ChatWithKK..." />
      <button id="sendBtn">Send</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
